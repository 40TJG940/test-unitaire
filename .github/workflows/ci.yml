name: CI — Lint, Tests & E2E

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  # ── 2. Tests back-end (Jest) ─────────────────────────────────────────────
  test-backend:
    name: Tests back-end — Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.x", "24.x"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm ci
      - run: npm run test:back -- --ci --coverage

      - name: Upload rapport de couverture back-end
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: coverage/
          retention-days: 30

  # ── 3. Tests front-end unitaires (Jest) ──────────────────────────────────
  test-frontend-unit:
    name: Tests front-end unitaires (Jest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
      - run: npm ci
      - run: npm run test:front:unit -- --ci

  # ── 4. Tests E2E Playwright ───────────────────────────────────────────────
  e2e:
    name: Tests E2E — ${{ matrix.browser }}
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend-unit]
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
      - run: npm ci
      - name: Installer les navigateurs Playwright
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Démarrer le serveur en arrière-plan
        run: npm start &

      - name: Attendre que le serveur soit prêt
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ && break || sleep 1
          done

      - name: Exécuter les tests E2E (${{ matrix.browser }})
        run: npm run test:e2e -- --project=${{ matrix.browser }}
        env:
          BASE_URL: http://localhost:3000

      - name: Upload rapport Playwright (en cas d'échec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

  # ── 5. Vérification des builds Docker ────────────────────────────────────
  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend-unit]
    steps:
      - uses: actions/checkout@v5

      - name: Build image back-end (production)
        run: docker build --target production -t calculator-backend .

      - name: Build image front-end (nginx)
        run: docker build -f Dockerfile.frontend -t calculator-frontend .

      - name: Build image Playwright (E2E)
        run: docker build -f Dockerfile.playwright -t calculator-playwright .
