name: CI — Lint, Tests & E2E

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  # ── 2. Tests back-end (Jest) ─────────────────────────────────────────────
  test-backend:
    name: Tests back-end — Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.x", "24.x"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm ci
      - run: npm run test:back -- --ci --coverage

      - name: Upload rapport de couverture back-end
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: coverage/
          retention-days: 30

  # ── 3. Tests front-end unitaires (Jest) ──────────────────────────────────
  test-frontend-unit:
    name: Tests front-end unitaires (Jest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
      - run: npm ci
      - run: npm run test:front:unit -- --ci

  # ── 4. Tests back-end Go ─────────────────────────────────────────────────
  test-go:
    name: Tests back-end Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Vet
        working-directory: Back_go
        run: go vet ./...
      - name: Test
        working-directory: Back_go
        run: go test ./... -v -coverprofile=coverage.out
      - name: Upload rapport de couverture Go
        uses: actions/upload-artifact@v4
        with:
          name: coverage-go
          path: Back_go/coverage.out
          retention-days: 30

  # ── 5. Tests back-end Python ─────────────────────────────────────────────
  test-python:
    name: Tests back-end Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installer les dépendances
        working-directory: Back_Python
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Tests
        working-directory: Back_Python
        run: pytest test_calculator.py -v

  # ── 6. Tests back-end Rust ───────────────────────────────────────────────
  test-rust:
    name: Tests back-end Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Tests
        working-directory: back_rust
        run: cargo test --verbose

  # ── 7. Tests back-end C ──────────────────────────────────────────────────
  test-c:
    name: Tests back-end C
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Tests
        working-directory: Back_c
        run: make test

  # ── 8. Tests back-end C# ─────────────────────────────────────────────────
  test-csharp:
    name: Tests back-end C#
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: Tests
        working-directory: Back_csharp
        run: dotnet run -- test

  # ── 9. Tests E2E Playwright ───────────────────────────────────────────────
  e2e:
    name: Tests E2E — ${{ matrix.browser }}
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend-unit]
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
      - run: npm ci
      - name: Installer les navigateurs Playwright
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Démarrer le serveur en arrière-plan
        run: npm start &

      - name: Attendre que le serveur soit prêt
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ && break || sleep 1
          done

      - name: Exécuter les tests E2E (${{ matrix.browser }})
        run: npm run test:e2e -- --project=${{ matrix.browser }}
        env:
          BASE_URL: http://localhost:3000

      - name: Upload rapport Playwright (en cas d'échec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

  # ── 10. Vérification des builds Docker ───────────────────────────────────
  docker:
    name: Build Docker (tous les backends)
    runs-on: ubuntu-latest
    needs: [test-backend, test-go, test-python, test-rust, test-c, test-csharp, test-frontend-unit]
    steps:
      - uses: actions/checkout@v5
      - name: Build toutes les images
        run: docker compose -f docker/docker-compose.yml build
