# nginx du service rust-front : sert le front et proxie /calculate vers le backend Rust.
server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /calculate {
        proxy_pass http://rust:3000;
        proxy_set_header Host $host;
    }
}
