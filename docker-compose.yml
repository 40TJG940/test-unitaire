services:
  backend:
    build:
      context: .
      target: production
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  tests:
    build:
      context: .
      target: test
    command: npm test
    # Les tests Jest démarrent leur propre serveur en mémoire (port 0) :
    # ils sont indépendants du service backend.
    profiles:
      - test

  playwright:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    depends_on:
      frontend:
        condition: service_healthy
      tests:
        condition: service_completed_successfully
    environment:
      BASE_URL: http://frontend
    profiles:
      - e2e
